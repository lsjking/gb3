<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ABS🔵UL HUD</title>
    <link rel="stylesheet" href="home.css" />
  </head>

  <body>
    <!-- ===== STATE MODES ===== -->
    <input type="radio" name="mode" id="mode-standby" checked />
    <input type="radio" name="mode" id="mode-analysis" />
    <input type="radio" name="mode" id="mode-alert" />
    <input type="radio" name="mode" id="mode-sleep" />

    <!-- ===== HUD STATUS ===== -->
    <section class="hud-status">
      <p>SYS : ONLINE</p>
      <p>CORE TEMP : 36°C</p>
      <p>
        MODE :
        <label for="mode-standby">STANDBY</label> |
        <label for="mode-analysis">ANALYSIS</label> |
        <label for="mode-alert">ALERT</label> |
        <label for="mode-sleep">SLEEP</label>
      </p>
    </section>

    <!-- ===== ABSOUL + ORBIT ===== -->
    <div class="orbit-wrapper">
      <input type="checkbox" id="menu-toggle" />

      <label for="menu-toggle" class="menu-btn">
        <span>LINK START</span>
      </label>

      <!-- AI STATUS TEXT -->
      <div class="ai-text">
        <span class="standby">Awaiting user signal…</span>
        <span class="analysis">Analyzing parameters…</span>
        <span class="alert">⚠ Threat detected</span>
        <span class="sleep">Minimal cognition active</span>
      </div>

      <!-- STAGE -->
      <div class="stage" style="--count: 10">
        <div class="orbit" style="--i: 0">
          <a class="ball"><span>PROJECT</span></a>
        </div>
        <div class="orbit" style="--i: 1">
          <a class="ball"><span>TEAM</span></a>
        </div>
        <div class="orbit" style="--i: 2">
          <a class="ball"><span>ABOUT</span></a>
        </div>
        <div class="orbit" style="--i: 3">
          <a class="ball"><span>CONTACT</span></a>
        </div>
        <div class="orbit" style="--i: 4">
          <a class="ball"><span>BLOG</span></a>
        </div>
        <div class="orbit" style="--i: 5">
          <a class="ball"><span>DEV</span></a>
        </div>
        <div class="orbit" style="--i: 6">
          <a class="ball"><span>LAB</span></a>
        </div>
        <div class="orbit" style="--i: 7">
          <a class="ball"><span>SHOP</span></a>
        </div>
        <div class="orbit" style="--i: 8">
          <a class="ball"><span>CAREER</span></a>
        </div>
        <div class="orbit" style="--i: 9">
          <a class="ball"><span>HELP</span></a>
        </div>
      </div>
    </div>
  </body>
</html>
