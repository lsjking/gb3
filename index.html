<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>J.A.R.V.I.S</title>
    <link rel="stylesheet" href="style.css" />

    <!-- HUD 전용 스타일 -->
    <link rel="stylesheet" href="home.css" />
  </head>

  <body class="no-anim">
    <!-- ================================================= -->
    <!-- ✅ HUD ROOT -->
    <!-- ================================================= -->
    <div class="hud-root">
      <!-- ===== STATE MODES ===== -->
      <input type="radio" name="mode" id="mode-standby" checked />
      <input type="radio" name="mode" id="mode-analysis" />
      <input type="radio" name="mode" id="mode-alert" />
      <input type="radio" name="mode" id="mode-sleep" />

      <!-- ===== HUD STATUS ===== -->
      <section class="hud-status">
        <p>
          MODE :
          <label for="mode-standby">STANDBY</label> |
          <label for="mode-analysis">ANALYSIS</label> |
          <label for="mode-alert">ALERT</label> |
          <label for="mode-sleep">SLEEP</label>
        </p>
      </section>

      <!-- ===== J.A.R.V.I.S CORE + ORBIT ===== -->
      <div class="orbit-wrapper">
        <input type="checkbox" id="menu-toggle" checked />

        <!-- CORE -->
        <label for="menu-toggle" class="menu-btn">
          <span class="core-glow"></span>
          <span class="core-label">J.A.R.V.I.S</span>
        </label>

        <!-- AI TEXT -->
        <div class="ai-text">
          <span class="standby">
            <strong class="ai-label">JARVIS ONLINE</strong>
            <span class="ai-msg">Awaiting instructions.</span>
          </span>

          <span class="analysis">
            <strong class="ai-label">JARVIS ANALYSIS</strong>
            <span class="ai-msg">Scanning environment.</span>
          </span>

          <span class="alert">
            <strong class="ai-label">JARVIS ALERT</strong>
            <span class="ai-msg">Threat detected.</span>
          </span>

          <span class="sleep">
            <strong class="ai-label">JARVIS STANDBY</strong>
            <span class="ai-msg">Minimal systems active.</span>
          </span>
        </div>

        <!-- STAGE -->
        <div class="stage" style="--count: 8">
          <div class="orbit" style="--i: 0">
            <a class="ball" href="team.html"><span>소개</span></a>
          </div>

          <div class="orbit" style="--i: 1">
            <a class="ball" href="lab.html">
              <span>AI공부내용</span>
            </a>
          </div>

          <div class="orbit" style="--i: 2">
            <a class="ball disabled"><span>INFO</span></a>
          </div>

          <div class="orbit" style="--i: 3">
            <a class="ball disabled"><span>BLOG</span></a>
          </div>

          <div class="orbit" style="--i: 4">
            <a class="ball disabled"><span>DEV</span></a>
          </div>

          <div class="orbit" style="--i: 5">
            <a class="ball disabled"><span>LAB</span></a>
          </div>

          <div class="orbit" style="--i: 6">
            <a class="ball"><span>HELP</span></a>
          </div>

          <div class="orbit" style="--i: 7">
            <a class="ball disabled" href="">
              <span>QUIZ</span>
            </a>
          </div>
        </div>
      </div>
    </div>
    <!-- ===== HUD ROOT END ===== -->
    <footer style="color: #6ee7ff; letter-spacing: 2px">
      SYSTEM STATUS : ONLINE ● © 2026 LIM SEONGJUN (ABSOUL)
    </footer>
  </body>
</html>
